apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: weather-app-api-pdb
  namespace: {{ .Release.Namespace }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      app: weather-app
      component: api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: weather-app-ui-pdb
  namespace: {{ .Release.Namespace }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      app: weather-app
      component: ui
