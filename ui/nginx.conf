server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /weather/ {
        proxy_pass http://weather-app-api:8080/weather/;
        proxy_set_header Host $host;
    }

    location /health {
        return 200 'healthy';
        add_header Content-Type text/plain;
    }

    location /ready {
        return 200 'ready';
        add_header Content-Type text/plain;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
