replicaCount: 2

api:
  image:
    repository: surendrak17/weather-api
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

ui:
  image:
    repository: surendrak17/weather-ui
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

configmap:
  weatherApiUrl: https://api.openweathermap.org/data/2.5
  appEnv: production
  logLevel: INFO

secret:
  weatherApiKey: ""

hpa:
  minReplicas: 2
  maxReplicas: 10
  cpuUtilization: 70

ingress:
  enabled: true
  className: nginx
  host: weather-app.local
  tls: false

pdb:
  minAvailable: 1
